name: Test

on:
  push:
  pull_request:
  schedule:
    # Every day at 18:23
    - cron: "23 18 * * *"

jobs:
  test:
    name: ${{ matrix.lisp }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        lisp: [sbcl-bin, ccl-bin, cmu-bin, ecl, abcl-bin]
        os: [ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Let ASDF find the project
        run: mkdir ~/common-lisp; ln -s `pwd` ~/common-lisp/journal

      - name: Install Roswell
        env:
          LISP: ${{ matrix.lisp }}
        run: |
          curl -L https://raw.githubusercontent.com/roswell/roswell/master/scripts/install-for-ci.sh | sh

      - name: Install latest MGL-PAX from GitHub
        run: ros install melisgl/mgl-pax

      - name: Install latest Named-readtables from GitHub
        run: ros install melisgl/named-readtables

      - name: Install latest Try from GitHub
        run: ros install melisgl/try

      - name: Run tests
        env:
          LISP: ${{ matrix.lisp }}
        run: |
          ros run -e '(ql:quickload :journal)' -q
          ./test/test.sh $LISP
